 <style>
    /* Teste do menu mobile */
 /* HEADER */
    header{
      width:100%;
      height:70px;
      background:#111;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 20px;
      color:#fff;
      position:fixed;
      top:0;
      left:0;
      z-index:1000;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
    }

    /* BOTÃO HAMBURGUER */
    .hamburger{
      width:35px;
      height:30px;
      display:none;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      z-index:2001;
    }

    .hamburger span{
      width:100%;
      height:4px;
      background:#fff;
      border-radius:5px;
      transition:0.3s;
    }

    /* MENU */
    .mobile-menu{
      position:fixed;
      top:0;
      right:-100%;
      width:100%;
      height:100vh;
      background:#111;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:30px;
      transition:0.4s ease;
      z-index:2000;
    }

    .mobile-menu a{
      color:#fff;
      text-decoration:none;
      font-size:28px;
      transition:0.3s;
    }

    .mobile-menu a:hover{
      color:#00bfff;
    }

    /* MENU ATIVO */
    .mobile-menu.active{
      right:0;
    }

    /* ANIMAÇÃO X */
    .hamburger.active span:nth-child(1){
      transform:rotate(45deg) translate(8px,8px);
    }

    .hamburger.active span:nth-child(2){
      opacity:0;
    }

    .hamburger.active span:nth-child(3){
      transform:rotate(-45deg) translate(8px,-8px);
    }

    /* CONTEÚDO */
    .content{
      padding-top:100px;
      text-align:center;
    }

    /* SOMENTE MOBILE */
    @media(max-width:768px){
      .hamburger{
        display:flex;
      }
    }
 </style>
 
 <section>
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="mobile-menu" id="mobileMenu">
      <a href="./index.html">Home</a>
      <a href="./casos-reais.html">Casos Reais</a>
      <a href="./comercializacao.html">Comercialização</a>
      <a href="./sobre-zenite.html">Sobre Zênite</a>
    </nav>
  </section>
